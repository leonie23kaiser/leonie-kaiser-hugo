name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/growthtogether.at/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
  schedule:
    # Mo 05:00 UTC – future-dated Journal-Posts publishen
    - cron: '0 5 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.135.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -q -O /tmp/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i /tmp/hugo.deb

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Vienna
        run: |
          hugo \
            --source src/growthtogether.at \
            --minify \
            --gc \
            --buildFuture \
            --baseURL "https://leoniekaiser.com/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/growthtogether.at/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: HITL-Notify für neu sichtbare Journal-Posts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ: Europe/Vienna
        run: |
          set -euo pipefail
          today=$(date +%s)
          week_ago=$(date -d '7 days ago' +%s)
          shopt -s nullglob
          for f in src/growthtogether.at/content/journal/*.md; do
            name=$(basename "$f" .md)
            [ "$name" = "_index" ] && continue
            fm=$(awk '/^---$/{c++; next} c==1' "$f")
            date_str=$(printf '%s\n' "$fm" | sed -n 's/^date: *//p' | head -1 | tr -d '"')
            draft=$(printf '%s\n'   "$fm" | sed -n 's/^draft: *//p' | head -1 | tr -d '"')
            title=$(printf '%s\n'   "$fm" | sed -n 's/^title: *//p' | head -1 | sed 's/^"//;s/"$//')
            summary=$(printf '%s\n' "$fm" | sed -n 's/^summary: *//p' | head -1 | sed 's/^"//;s/"$//')
            [ "$draft" = "true" ] && continue
            [ -z "$date_str" ] && continue
            ts=$(date -d "$date_str" +%s 2>/dev/null || echo 0)
            [ "$ts" -gt "$today" ]    && continue
            [ "$ts" -lt "$week_ago" ] && continue
            issue_title="Journal live: $name"
            existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all \
              --search "\"$issue_title\" in:title" \
              --json title --jq "[.[] | select(.title==\"$issue_title\")] | length")
            if [ "$existing" != "0" ]; then
              echo "skip (already notified): $name"; continue
            fi
            gh label create journal-live --repo "$GITHUB_REPOSITORY" \
              --color "0E8A16" --description "HITL-Notify: Journal-Post live" 2>/dev/null || true
            body=$(printf '**Titel:** %s\n**Slug:** %s\n**Datum:** %s\n**Summary:** %s\n\n**Live:** https://leoniekaiser.com/blog/%s/\n\nBitte sichten — passt der Post so live, oder Anpassung/Rückzug nötig?\n' \
              "$title" "$name" "$date_str" "$summary" "$name")
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$issue_title" --body "$body" \
              --label journal-live --assignee leonie23kaiser \
            || gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$issue_title" --body "$body" --label journal-live
          done
