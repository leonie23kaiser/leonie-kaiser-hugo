process:
  eyebrow: "Mein Prozess"
  heading: "In 3 Schritten zu Ihrer KI-Lösung"
  sub: "Klar, transparent und ohne Überraschungen – so läuft unsere Zusammenarbeit ab."
  steps:
    - num: "01"
      title: "Kostenfreie Potenzialanalyse"
      text: "30 Minuten, online, unverbindlich. Wir analysieren gemeinsam Ihren Ist-Zustand, Ihre Ziele und die KI-Potenziale in Ihrem Unternehmen. Sie bekommen eine erste klare Einschätzung – kostenlos und ohne Verpflichtung."
    - num: "02"
      title: "Strategie & Roadmap"
      text: "Auf Basis der Analyse erstelle ich eine maßgeschneiderte KI-Roadmap mit konkreten Maßnahmen, klaren Prioritäten und einem realistischen Zeitplan – abgestimmt auf Ihre Ressourcen und Ziele."
    - num: "03"
      title: "Implementierung & Begleitung"
      text: "Ich begleite Sie von der Idee bis zur fertigen Lösung. Remote oder vor Ort, Schritt für Schritt – bis Ihre Prozesse wirklich smarter laufen und Ihr Team sicher mit den neuen Tools umgehen kann."

