about:
  eyebrow: "Über mich"
  heading: "Strategie, KI & die menschliche Komponente"
  paragraphs:
    - "Als KI & Business Consultant begleite ich Unternehmen dabei, künstliche Intelligenz wirklich nutzbar zu machen – strategisch, praxisnah und mit einem ganzheitlichen Blick auf Business, Menschen und nachhaltige Veränderung."
    - "Mit über 20 Jahren Erfahrung im globalen Projektmanagement, strategischem Marketing und Unternehmensberatung kenne ich die Realität von Unternehmen: volle Kalender, komplexe Strukturen und die ständige Frage, wo man überhaupt anfangen soll. Genau hier setze ich an – mit einem Ansatz, der Business-Know-how, KI-Expertise und die menschliche Komponente verbindet."
  pills_label: "Erfahrung aus Unternehmen wie:"
  pills:
    - "Merck Group"
    - "AbbVie GmbH"
    - "Baxter Innovations"
    - "Global Projektmanagement"
    - "Digital Marketing"
    - "Unternehmensberatung"
  values:
    - icon: "🛡️"
      title: "Ethische KI"
      color: "violet"
      text: "Verantwortungsvoller KI-Einsatz im Sinne des EU AI Act – Technologie, die dem Menschen dient und nicht überfordert."
    - icon: "⏱️"
      title: "Praxisnah & umsetzbar"
      color: "teal"
      text: "Keine Theorie, keine Buzzwords – Lösungen, die in Ihrem Alltag sofort funktionieren und messbar Zeit sparen."
    - icon: "🤝"
      title: "Ganzheitlicher Ansatz"
      color: "gold"
      text: "Business-Know-how, KI-Expertise und die menschliche Komponente – für Veränderungen, die wirklich und nachhaltig tragen."

