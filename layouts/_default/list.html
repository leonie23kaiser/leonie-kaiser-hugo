{{ define "main" }}
<section class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="section-list">
  <div class="container">
    {{ .Content }}
    <div class="child-pages">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="child-page-card card-elevated">
        <h3>{{ .Title }}</h3>
        {{ with .Description }}
        <p>{{ . }}</p>
        {{ end }}
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
