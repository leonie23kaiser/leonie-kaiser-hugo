{{ define "main" }}
<section class="page-header">
  <div class="container">
    <div class="kicker">{{ .Data.Plural | humanize }}</div>
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="section">
  <div class="container">
    <div class="cards">
      {{ range .Pages }}
        <a class="card" href="{{ .RelPermalink }}"><h3>{{ .Title }}</h3><p>({{ len .Pages }})</p></a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
