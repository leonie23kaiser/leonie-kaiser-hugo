baseURL = 'https://growthtogether.at/'
languageCode = 'de-AT'
defaultContentLanguage = 'de'
title = 'Leonie Kaiser | KI-Beratung Wien – Strategie, Automatisierung & EU AI Act'

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ['HTML','RSS']

[imaging]
  quality = 82
  resampleFilter = 'Lanczos'

[minify]
  minifyOutput = true

[sitemap]
  changefreq = 'monthly'
  priority = 0.7
  filename = 'sitemap.xml'
