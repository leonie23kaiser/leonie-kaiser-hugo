- slug: physiotherapie
  branche: Physiotherapie-Praxis
  branche_kurz: Physiotherapie
  zielperson: "Inhaberin einer Physiotherapie-Praxis mit 3–10 Mitarbeitenden"
  schmerz: "Termin-Anfragen liegen liegen, Doku frisst Abendstunden, neue Patienten müssen abgewiesen werden."
  usecases:
    - titel: "Terminanfragen schneller beantworten"
      desc: "Vorqualifizierung und freundliche Erstantwort, damit keine Anfrage länger als zwei Stunden liegt."
    - titel: "Dokumentation entlasten"
      desc: "Gesprächsnotizen strukturiert ablegen, Behandlungsberichte vorbereiten – mit datenschutzkonformem Setup."
    - titel: "Recall-Prozesse für Stammpatienten"
      desc: "Wer war länger nicht da? Strukturierte Hinweise, ohne dass Sie selbst durch Listen klicken."
  faq:
    - q: "Dürfen Patientendaten in ein KI-Tool?"
      a: "Nicht ohne saubere Konfiguration. Gesundheitsdaten sind besondere Daten nach DSGVO Art. 9. Wir setzen für Sie Tools auf, die das von Grund auf richtig machen."
    - q: "Brauche ich eine Vollzeit-IT dafür?"
      a: "Nein. Die meisten Lösungen funktionieren ohne IT-Projekt – Schritt für Schritt eingeführt, mit Begleitung."

- slug: psychotherapie
  branche: Psychotherapie-Praxis
  branche_kurz: Psychotherapie
  zielperson: "Psychotherapeut:in in eigener Praxis oder kleiner Gemeinschaftspraxis"
  schmerz: "Erstkontakt, Wartelisten und Doku verlangen viel Zeit – die fehlt für die eigentliche Arbeit."
  usecases:
    - titel: "Erstkontakt strukturieren"
      desc: "Anfragen ordnen, Erstinfos automatisiert verschicken, Termin-Vorschläge ohne Hin und Her."
    - titel: "Verlaufsnotizen vorbereiten"
      desc: "Strukturierte Dokumentation, die Ihnen Zeit gibt – mit klaren Grenzen, was KI nicht entscheiden darf."
    - titel: "Aufklärungs- und Informationsmaterial"
      desc: "Patienten-Infos, Aufklärungsblätter, Vorlagen – strukturiert, in Ihrer Sprache."
  faq:
    - q: "Ist KI in der Psychotherapie überhaupt zulässig?"
      a: "Als unterstützendes Werkzeug im Hintergrund: ja, wenn datenschutzkonform aufgesetzt. Als Ersatz für therapeutische Entscheidungen: nein – das ist auch nicht das Ziel."
    - q: "Was ist mit Schweigepflicht und Berufsrecht?"
      a: "Berufsrecht und Schweigepflicht sind das Fundament. Wir wählen Tools und Prozesse so aus, dass beides gewahrt bleibt."

- slug: ernaehrungsberatung
  branche: Ernährungsberatung
  branche_kurz: Ernährungsberatung
  zielperson: "Diaetolog:in oder Ernährungsberater:in mit eigener Praxis"
  schmerz: "Viel Doku, viele wiederkehrende Texte, wenig Zeit für Sichtbarkeit und neue Kundschaft."
  usecases:
    - titel: "Beratungsprotokolle effizient erstellen"
      desc: "Aus Notizen strukturierte Protokolle, die Sie nur noch gegenlesen."
    - titel: "Wiederkehrende Inhalte automatisieren"
      desc: "Rezeptvorschläge, Wochenpläne, Standard-Aufklärungen – als Vorlagen, die in Ihrer Sprache klingen."
    - titel: "Sichtbarkeit ohne Mehraufwand"
      desc: "Aus einem Beratungsthema werden Blog-, Newsletter- und Social-Inhalte – strukturiert in einem Durchgang."
  faq:
    - q: "Dürfen Klient:innen-Daten in die KI?"
      a: "Nur mit sauberem Setup und Einwilligung. Wir klären in der Potenzialanalyse, was geht und was nicht."

- slug: coaching
  branche: Coaching-Praxis
  branche_kurz: Coaching
  zielperson: "Selbstständige Coaches mit eigenem Programm und kleinem Team"
  schmerz: "Sales-Calls, Doku, Content – alles parallel, alles selbst. Wachstum stößt an Zeitgrenzen."
  usecases:
    - titel: "Lead-Qualifizierung vor dem Sales-Call"
      desc: "Strukturierte Vorinfos einsammeln, damit der Call nicht mit Basis-Fragen startet."
    - titel: "Content aus Programmen extrahieren"
      desc: "Aus Aufzeichnungen oder Notizen werden LinkedIn-Posts, Blog-Artikel und Newsletter – in Ihrer Stimme."
    - titel: "Onboarding-Strecken automatisieren"
      desc: "Willkommens-Mails, Vorbereitungs-Material, Erinnerungen – strukturiert und ohne Zettelwirtschaft."
  faq:
    - q: "Verliert mein Coaching die persönliche Note durch KI?"
      a: "Im Gegenteil. KI übernimmt das Drumherum – die Zeit, die Sie zurückbekommen, geht in echte Präsenz mit Ihren Klient:innen."
