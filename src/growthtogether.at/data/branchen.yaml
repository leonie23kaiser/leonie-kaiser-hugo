- slug: termine-anfragen
  url: /leistungen/termine-und-anfragen/
  branche: Termine & Anfragen
  schmerz: "Anfragen kommen über Telefon, WhatsApp und E-Mail herein, Erinnerungen werden manuell verschickt, und kurzfristige Absagen hinterlassen Lücken im Kalender."
  intro: "Gewinnen Sie den Empfang zurück, ohne dass jemand ständig ans Telefon muss."
  usecases:
    - titel: "Online-Terminbuchung"
      desc: "Ein Selbstbuchungslink, in Ihr bestehendes System integriert. Ihre Kundschaft bucht selbst, Sie behalten die Kontrolle über den Kalender."
    - titel: "Automatische Erinnerungen und Wartelisten-Nachbesetzung"
      desc: "Erinnerungen über den bevorzugten Kanal senken die Ausfälle. Kurzfristig frei gewordene Termine werden automatisch aus der Warteliste nachbesetzt."
    - titel: "Chat-Assistent für Erstanfragen"
      desc: "Ein datenschutzkonformer Assistent auf Ihrer Website beantwortet Öffnungszeiten, Anfahrt, Preise und Terminwünsche, ohne medizinische Auskunft zu geben."
    - titel: "Telefonassistent (Voicebot)"
      desc: "Nimmt Anrufe außerhalb der Öffnungszeiten entgegen, beantwortet Standardfragen und nimmt Terminwünsche auf, damit keine Anfrage verloren geht."
  beispiel:
    ausgangssituation: "In einer kleinen Physiotherapiepraxis kommen die Terminanfragen über Telefon, WhatsApp und E-Mail herein. Die Erinnerungen verschickt das Team von Hand. Sagt jemand kurzfristig ab, bleibt der Termin meist unbesetzt, und die Rezeption wird über den Tag hinweg immer wieder unterbrochen."
    vorgehen: "Wir richten eine Online-Terminbuchung mit Selbstbuchungslink ein. Dazu kommen automatische Erinnerungen über den bevorzugten Kanal und eine Warteliste, die frei gewordene Termine selbstständig nachbesetzt. Alles wird datenschutzkonform aufgesetzt und das Team wird eingewiesen."
    ergebnis: "Es gibt spürbar weniger Ausfälle, freie Termine füllen sich von selbst, und am Telefon gibt es deutlich weniger Rückfragen. So bleibt pro Tag mehr Zeit für die Behandlung statt für die Organisation."
  faq:
    - q: "Kann ich selbst festlegen, was der Assistent beantwortet?"
      a: "Ja. Sie geben vor, welche Fragen er übernimmt, typischerweise Öffnungszeiten, Anfahrt, Preise und Terminwünsche. Alles Weitere leitet er an Sie und Ihr Team weiter."
    - q: "Lässt sich die Online-Terminbuchung in mein bestehendes System einbinden?"
      a: "In der Regel ja. Die Buchung wird an Ihren bestehenden Kalender oder Ihre Praxissoftware angebunden, sodass Sie weiter an einer Stelle arbeiten und den Überblick behalten."

- slug: nachsorge-bindung
  url: /leistungen/nachsorge-und-kundenbindung/
  branche: Nachsorge & Kundenbindung
  schmerz: "Oftmals reißt der Kontakt nach der Behandlung ab. Follow-ups und Recall erfolgen manuell und verstreut über verschiedene Kanäle."
  intro: "Mit automatisierter Nachsorge bleibt der Kontakt bestehen, ohne dass jemand aktiv daran denken und es umsetzen muss. Regelmäßige, gut getimte Erinnerungen erhöhen die Besuchsfrequenz Ihrer Stammkundschaft."
  usecases:
    - titel: "Automatisierte Nachsorge-Sequenzen"
      desc: "Nach Behandlung, Paket oder Erstberatung läuft die Nachsorge strukturiert, zur richtigen Zeit, im richtigen Ton, ohne manuelles Nachhalten."
    - titel: "Reaktivierung früherer Kundschaft"
      desc: "Wer länger nicht da war, bekommt zum passenden Zeitpunkt eine freundliche Erinnerung. Das reaktiviert Stammkundschaft und erhöht die Besuchsfrequenz."
    - titel: "Bewertungs- und Empfehlungsanfragen"
      desc: "Automatisch zum richtigen Zeitpunkt nach dem Termin, einer der stärksten Hebel für neue Anfragen, ganz ohne zusätzlichen Aufwand."
  beispiel:
    ausgangssituation: "In einer Medical-Wellness-Praxis reißt der Kontakt nach der Behandlung ab. Renewal-Erinnerungen und Follow-ups müssen manuell durchgeführt werden und sind über verschiedene Kanäle verstreut. Dadurch werden sie leicht vergessen oder gehen unter, und Kundschaft geht still verloren."
    vorgehen: "Wir richten eine automatisierte Nachsorge-Sequenz ein, dazu einen Recall zum richtigen Zeitpunkt, eine Bewertungsanfrage nach dem Termin und Erinnerungen an auslaufende Mitgliedschaften. Alles wird datenschutzkonform aufgesetzt und das Team wird eingewiesen."
    ergebnis: "Es gibt mehr Folgetermine und eine planbarere Auslastung. Die Nachsorge läuft zuverlässig, ohne dass jemand aktiv daran denken und sie umsetzen muss."
  faq:
    - q: "Wirken automatische Nachrichten nicht unpersönlich?"
      a: "Nicht, wenn sie gut gemacht sind. Die Nachrichten klingen nach Ihnen, nicht automatisiert, und Sie geben frei, was rausgeht. KI nimmt die Routine, nicht die persönliche Beziehung."
    - q: "Dürfen Kundendaten dafür verarbeitet werden?"
      a: "Mit dem passenden Setup ja: EU-Hosting wo möglich, Auftragsverarbeitungsverträge und klar geregelte Datenflüsse. Welche Lösung zu Ihrer Praxis passt, klären wir gemeinsam."

- slug: dokumentation-wissen
  url: /leistungen/dokumentation-und-wissen/
  branche: Dokumentation & Wissen
  schmerz: "Befunde und Notizen werden abends nachgeschrieben, alle im Team dokumentieren auf ihre eigene Art, und wichtiges Wissen steckt in einzelnen Köpfen, Notizbüchern und verstreuten Dateien."
  intro: "Gewinnen Sie Ihre Abende zurück und machen Sie Vertretung und Einarbeitung neuer Mitarbeiter leichter."
  usecases:
    - titel: "Notizen strukturieren"
      desc: "Aus Gesprächs- und Behandlungsnotizen wird ein sauberes Protokoll, das Sie nur noch gegenlesen. Die fachliche Beurteilung bleibt jederzeit bei Ihnen."
    - titel: "Vorlagen-Bibliothek"
      desc: "Für Berichte, Rückmeldungen an Zuweiser, Aufklärungen und individuelle Pläne. Einmal aufgesetzt, in Ihrer Sprache, immer wieder nutzbar."
    - titel: "Praxis-Handbuch fürs Team"
      desc: "Ein zentrales, lebendes Handbuch für die Praxis: wiederkehrende Abläufe (Terminvergabe, Abrechnung, Geräte), Vorlagen, Zuständigkeiten und Antworten auf häufige Fragen. So steckt Wissen nicht mehr nur in einzelnen Köpfen, und Vertretung und Einarbeitung neuer Mitarbeitender werden deutlich leichter."
  beispiel:
    ausgangssituation: "In einer kleinen Gesundheitspraxis werden Befunde und Notizen abends nachgeschrieben. Alle im Team dokumentieren auf ihre eigene Art, und wichtiges Wissen steckt in einzelnen Köpfen, Notizbüchern und verstreuten Dateien."
    vorgehen: "Wir bereiten Ihre Notizen strukturiert auf, sodass Sie sie nur noch gegenlesen und freigeben. Dazu kommen eine Vorlagen-Bibliothek für wiederkehrende Dokumente und ein zentrales Praxis-Handbuch fürs Team. Alles wird Art.-9-konform aufgesetzt."
    ergebnis: "Es bleibt kaum noch Arbeit nach Feierabend, die Dokumentation ist einheitlich, und Vertretung oder Einarbeitung neuer Mitarbeitender wird deutlich einfacher."
  faq:
    - q: "Behalte ich die Kontrolle über die Dokumentation?"
      a: "Ja, vollständig. Die KI bereitet Ihre Notizen und Vorlagen nur vor, Sie lesen gegen und geben frei. Die fachliche Beurteilung und jede Entscheidung bleiben bei Ihnen."
    - q: "Sind Gesundheitsdaten dabei sicher?"
      a: "Datenschutz ist die Grundlage. Gesundheitsdaten fallen unter DSGVO Art. 9. Wir arbeiten mit EU-Hosting wo möglich und, wenn die Daten besonders sensibel sind, auch mit lokalen Lösungen, bei denen die Daten Ihre Praxis nicht verlassen. Dazu kommen Auftragsverarbeitungsverträge und klar geregelte Datenflüsse."
