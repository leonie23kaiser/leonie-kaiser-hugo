- slug: termine-anfragen
  url: /leistungen/termine-und-anfragen/
  branche: Termine & Anfragen
  schmerz: "Anfragen kommen über Telefon, WhatsApp und E-Mail herein, Erinnerungen laufen von Hand, und kurzfristige Absagen reißen Lücken in den Tag."
  intro: "So gewinnen Sie den Empfang zurück – ohne dass jemand ständig ans Telefon muss."
  usecases:
    - titel: "Online-Terminbuchung"
      desc: "Ein Selbstbuchungslink, in Ihr bestehendes System integriert. Ihre Kundschaft bucht selbst, Sie behalten die Kontrolle über den Kalender."
    - titel: "Automatische Erinnerungen und Wartelisten-Nachbesetzung"
      desc: "Erinnerungen über den bevorzugten Kanal senken die Ausfälle. Kurzfristig frei gewordene Termine werden automatisch aus der Warteliste nachbesetzt."
    - titel: "KI-Assistent für Erstanfragen"
      desc: "Ein datenschutzkonformer Assistent auf Ihrer Website beantwortet Öffnungszeiten, Anfahrt, Preise und Terminwünsche – ohne medizinische Auskunft."
  beispiel:
    ausgangssituation: "Termine kommen über Telefon, WhatsApp und E-Mail herein. Erinnerungen laufen von Hand, kurzfristige Absagen reißen Lücken in den Tag, und die Rezeption wird ständig unterbrochen."
    vorgehen: "Online-Buchung mit Selbstbuchungslink, automatische Erinnerungen über den bevorzugten Kanal, Wartelisten-Nachbesetzung für frei gewordene Slots – datenschutzkonform, das Team wird eingewiesen."
    ergebnis: "Spürbar weniger Ausfälle, Lücken füllen sich von selbst, deutlich weniger Telefon-Pingpong – mehr Behandlungs- statt Organisationszeit pro Tag."
  faq:
    - q: "Ersetzt der KI-Assistent die persönliche Beratung?"
      a: "Nein. Er übernimmt nur die immer gleichen Erstfragen und Terminwünsche. Die eigentliche Beratung – und alles Medizinische – bleibt bei Ihnen und Ihrem Team."
    - q: "Was ist mit Termindaten und Datenschutz?"
      a: "Datenschutz ist der Ausgangspunkt: EU-Hosting wo möglich, Auftragsverarbeitungsverträge mit allen eingesetzten Tools und klare Datenflüsse. Details auf der EU-AI-Act-Seite."

- slug: nachsorge-bindung
  url: /leistungen/nachsorge-und-kundenbindung/
  branche: Nachsorge & Kundenbindung
  schmerz: "Nach der Behandlung reißt der Kontakt ab. Follow-ups und Recall laufen von Hand und verstreut über verschiedene Kanäle – und Kundschaft geht still verloren."
  intro: "So bleibt der Kontakt bestehen, ohne dass jemand aktiv daran denken muss."
  usecases:
    - titel: "Automatisierte Nachsorge-Sequenzen"
      desc: "Nach Behandlung, Paket oder Erstberatung läuft die Nachsorge strukturiert – zur richtigen Zeit, im richtigen Ton, ohne manuelles Nachhalten."
    - titel: "Reaktivierung früherer Kundschaft"
      desc: "Wer länger nicht da war, bekommt zum passenden Zeitpunkt eine freundliche Erinnerung – Stammkundschaft, die sonst still verloren geht."
    - titel: "Bewertungs- und Empfehlungsanfragen"
      desc: "Automatisch zum richtigen Zeitpunkt nach dem Termin – einer der stärksten Hebel für neue Anfragen, ganz ohne zusätzlichen Aufwand."
  beispiel:
    ausgangssituation: "Nach der Behandlung reißt der Kontakt ab. Renewal-Erinnerungen und Follow-ups laufen manuell und verstreut über verschiedene Kanäle; Kundschaft geht still verloren."
    vorgehen: "Automatisierte Nachsorge-Sequenz, Recall zum richtigen Zeitpunkt, Bewertungsanfrage nach dem Termin, Erinnerungen an auslaufende Mitgliedschaften – datenschutzkonform, das Team wird eingewiesen."
    ergebnis: "Mehr Folgetermine, planbarere Auslastung, die Nachsorge läuft zuverlässig – ohne dass jemand aktiv daran denken muss."
  faq:
    - q: "Wirken automatische Nachrichten nicht unpersönlich?"
      a: "Nur, wenn sie schlecht gemacht sind. Die Entwürfe klingen nach Ihnen, nicht nach Maschine – und Sie geben frei, was rausgeht. KI nimmt die Routine, nicht die Beziehung."
    - q: "Dürfen Kundendaten dafür verarbeitet werden?"
      a: "Mit sauberem Setup ja: EU-Hosting wo möglich, Auftragsverarbeitungsverträge, klare Datenflüsse. Wir klären in der Potenzialanalyse, was geht und was nicht."

- slug: dokumentation-wissen
  url: /leistungen/dokumentation-und-wissen/
  branche: Dokumentation & Wissen
  schmerz: "Befunde und Notizen werden abends nachgeschrieben, jede Person dokumentiert etwas anders, und kritisches Wissen steckt in einzelnen Köpfen."
  intro: "So gewinnen Sie Ihre Abende zurück – und machen Vertretung und Einarbeitung leichter."
  usecases:
    - titel: "Notizen strukturieren"
      desc: "Aus Gesprächs- und Behandlungsnotizen wird ein sauberes Protokoll, das Sie nur noch gegenlesen. Die fachliche Beurteilung bleibt immer bei Ihnen – keine automatische Diagnose."
    - titel: "Vorlagen-Bibliothek"
      desc: "Für Berichte, Rückmeldungen an Zuweiser, Aufklärungen und individuelle Pläne – einmal aufgesetzt, in Ihrer Sprache, immer wieder nutzbar."
    - titel: "Team-Playbook und Onboarding"
      desc: "Wiederkehrende Abläufe zentral und einfach abgelegt – löst „das Wissen steckt nur in meinem Kopf“ und macht Vertretung und Einarbeitung neuer Mitarbeitender deutlich leichter."
  beispiel:
    ausgangssituation: "Befunde und Notizen werden abends nachgeschrieben, jede Person dokumentiert etwas anders, und kritisches Wissen steckt in einzelnen Köpfen."
    vorgehen: "Strukturierung der Notizen (Sie geben frei), eine Vorlagen-Bibliothek für wiederkehrende Dokumente und ein zentrales Team-Playbook – alles Art.-9-konform aufgesetzt."
    ergebnis: "Weniger Arbeit nach Feierabend, einheitliche Dokumentation, und Vertretung oder Onboarding neuer Leute wird deutlich einfacher."
  faq:
    - q: "Trifft die KI medizinische Entscheidungen?"
      a: "Nein. Die KI strukturiert nur Ihre Notizen und bereitet Vorlagen vor. Die fachliche Beurteilung und jede Entscheidung bleiben vollständig bei Ihnen."
    - q: "Sind Gesundheitsdaten dabei sicher?"
      a: "Sie sind der Ausgangspunkt. Gesundheitsdaten fallen unter DSGVO Art. 9. Wir arbeiten mit EU-Hosting wo möglich, Auftragsverarbeitungsverträgen und klaren Datenflüssen – belegt, nicht behauptet."
