<!-- COOKIE BANNER -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:#fff;border-top:1px solid #ddd8d0;box-shadow:0 -4px 24px rgba(8,101,132,.12);
  padding:1.25rem clamp(1.5rem,5vw,4rem)">
  <div style="max-width:1200px;margin-inline:auto;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between">
    <div style="flex:1;min-width:260px">
      <p style="font-family:'Cabinet Grotesk','Helvetica Neue',sans-serif;font-size:.875rem;font-weight:700;color:#1c1c1c;margin-bottom:.25rem">🍪 Diese Website verwendet Cookies</p>
      <p style="font-size:.825rem;color:#5a5a5a;line-height:1.55;max-width:64ch">
        Wir verwenden notwendige Cookies für den Betrieb der Website sowie – mit Ihrer Einwilligung – Google Analytics zur Analyse des Nutzerverhaltens. Weitere Infos finden Sie in unserer
        <a href="/datenschutz" style="color:#086584;text-decoration:underline;text-underline-offset:2px">Datenschutzerklärung</a>.
      </p>
    </div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;flex-shrink:0">
      <button id="cookie-reject" style="padding:.5rem 1.25rem;border-radius:9999px;border:2px solid #530049;color:#530049;background:#fff;font-size:.825rem;font-weight:700;cursor:pointer">
        Nur notwendige
      </button>
      <button id="cookie-accept" style="padding:.5rem 1.5rem;border-radius:9999px;background:#530049;color:#fff;border:none;font-size:.825rem;font-weight:700;cursor:pointer">
        Alle akzeptieren
      </button>
    </div>
  </div>
</div>
