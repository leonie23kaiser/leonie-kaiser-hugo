<footer class="site-footer">
  <div class="wrap foot-grid">
    <div class="foot-brand">
      <div class="foot-logo">Leonie Kaiser</div>
      <small>KI & Business Consulting · leoniekaiser.com</small>
    </div>
    <nav class="foot-links" aria-label="Navigation">
      {{ range site.Menus.main }}<a href="{{ .URL }}">{{ .Name }}</a>{{ end }}
    </nav>
    <div class="foot-social">
      {{ with site.Params.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="LinkedIn">in</a>{{ end }}
    </div>
  </div>
  <div class="wrap foot-bottom">
    <span>© {{ now.Format "2006" }} {{ site.Params.orgLegal }}</span>
    <span>
      {{ range site.Menus.footer }}<a href="{{ .URL }}">{{ .Name }}</a>{{ if not .HasChildren }} · {{ end }}{{ end }}
    </span>
  </div>
</footer>
