<script>
(function(){
  var toggle = document.querySelector('.menu-toggle');
  var menu = document.querySelector('.menu');
  if(toggle && menu){
    toggle.addEventListener('click', function(){
      var open = menu.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    menu.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', function(){
        menu.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  }
  // simple form progressive enhancement: show success text instead of reload
  document.querySelectorAll('form.contact-form').forEach(function(f){
    f.addEventListener('submit', function(ev){
      var action = f.getAttribute('action') || '';
      if(action.indexOf('REPLACE_ME') !== -1){
        ev.preventDefault();
        var msg = f.getAttribute('data-success') || 'Danke!';
        f.innerHTML = '<div style="padding:40px;text-align:center;color:var(--teal-900);font-weight:600">'+msg+'</div>';
      }
    });
  });
})();
</script>
